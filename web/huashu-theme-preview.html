<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>错题本 UI 主题预览</title>
    <style>
      :root {
        --canvas: #f2ede2;
        --canvas-deep: #e7decd;
        --surface: #fffdf7;
        --surface-strong: #fff8ea;
        --surface-muted: #f9f5eb;
        --ink: #1f2a32;
        --ink-soft: #56606a;
        --accent: #0b7285;
        --accent-strong: #085a68;
        --accent-soft: #d5ecf0;
        --line: #d9cfbc;
        --line-strong: #bcae95;
        --danger: #b93c30;
        --success: #2f7e4f;
        --focus: #e59742;
        --shadow-soft: 0 10px 28px rgb(65 48 24 / 10%);
        --shadow-panel: 0 18px 42px rgb(52 39 20 / 14%);
      }

      * {
        box-sizing: border-box;
      }

      @keyframes fade-rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes wash-shift {
        from {
          transform: translate3d(0, 0, 0);
        }

        to {
          transform: translate3d(0, 22px, 0);
        }
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: 'Source Han Sans SC', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background:
          radial-gradient(1200px 560px at -10% -20%, rgb(225 184 118 / 30%), transparent 58%),
          radial-gradient(900px 520px at 112% -18%, rgb(114 178 190 / 28%), transparent 55%),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 33px,
            rgb(122 106 78 / 6%) 33px,
            rgb(122 106 78 / 6%) 34px
          ),
          linear-gradient(180deg, var(--canvas) 0%, var(--canvas-deep) 100%);
        min-height: 100vh;
        line-height: 1.45;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgb(255 255 255 / 0%) 0%, rgb(255 255 255 / 10%) 48%, rgb(255 255 255 / 0%) 100%);
        animation: wash-shift 14s linear infinite alternate;
        opacity: 0.75;
      }

      .container {
        width: min(1220px, calc(100% - 1.6rem));
        margin: 1rem auto 2.6rem;
        padding: 1.1rem;
        position: relative;
        z-index: 1;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: 'Source Han Serif SC', 'Songti SC', 'STSong', serif;
        letter-spacing: 0.01em;
        color: #1a2329;
      }

      h1 {
        font-size: clamp(1.62rem, 2.9vw, 2.25rem);
        margin-bottom: 0.36rem;
      }

      h2 {
        font-size: clamp(1.18rem, 2.15vw, 1.48rem);
      }

      h3 {
        font-size: 1.02rem;
      }

      .hero-panel,
      .panel,
      .workspace-tabs {
        animation: fade-rise 0.42s ease both;
      }

      .hero-panel {
        border: 1px solid var(--line-strong);
        border-radius: 20px;
        padding: 1.15rem;
        background: linear-gradient(145deg, rgb(255 253 246 / 98%) 0%, rgb(249 242 226 / 97%) 100%);
        box-shadow: var(--shadow-panel);
        display: grid;
        gap: 0.82rem;
      }

      .hint {
        color: var(--ink-soft);
        font-size: 0.92rem;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.52rem;
      }

      .stat-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: linear-gradient(180deg, #f4f9fa 0%, var(--accent-soft) 100%);
        color: var(--accent-strong);
        border: 1px solid #a9cfd6;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .workspace-tabs {
        display: grid;
        gap: 0.55rem;
        grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
        position: sticky;
        top: 0.45rem;
        z-index: 8;
        padding: 0.36rem;
        border-radius: 14px;
        background: rgb(255 248 235 / 82%);
        border: 1px solid rgb(188 174 149 / 65%);
        backdrop-filter: blur(8px);
      }

      .workspace-tab {
        background: linear-gradient(180deg, #fffdf8 0%, #f4ecdb 100%);
        border: 1px solid #cfbea3;
        color: #47515c;
        border-radius: 11px;
        padding: 0.62rem 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        min-height: 44px;
      }

      .workspace-tab.active {
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff;
        border-color: #064853;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.03rem;
        background: linear-gradient(180deg, var(--surface) 0%, var(--surface-muted) 100%);
        box-shadow: var(--shadow-soft);
        display: grid;
        gap: 0.82rem;
        margin-top: 1rem;
      }

      .form-grid {
        display: grid;
        gap: 0.88rem;
      }

      .two-col-grid {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      label {
        display: grid;
        gap: 0.4rem;
        color: var(--ink);
        font-size: 0.93rem;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 1px solid #c9b998;
        border-radius: 10px;
        background: #fffefb;
        color: #1f2a32;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--focus);
        box-shadow: 0 0 0 3px rgb(229 151 66 / 24%);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .action-row {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 0.62rem 0.95rem;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff;
        cursor: pointer;
        min-height: 42px;
        font-weight: 700;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 16px rgb(8 90 104 / 24%);
      }

      button.ghost {
        background: linear-gradient(180deg, #fffcf4 0%, #f2e7d2 100%);
        border-color: #c9b792;
        color: #37424f;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid #d4c6ab;
        border-radius: 12px;
        background: #fffef9;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }

      th,
      td {
        border: 1px solid #dfd1b8;
        padding: 0.52rem 0.56rem;
        vertical-align: top;
        font-size: 0.9rem;
      }

      th {
        background: linear-gradient(180deg, #f5ecdc 0%, #efe2ca 100%);
        text-align: left;
        color: #2a3640;
        position: sticky;
        top: 0;
      }

      .success {
        color: var(--success);
        font-weight: 600;
      }

      .error {
        color: var(--danger);
        font-weight: 600;
      }

      @media (max-width: 720px) {
        .container {
          width: calc(100% - 1rem);
          padding: 0.76rem;
        }

        button,
        .workspace-tab {
          width: 100%;
        }

        .action-row {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>错题本（主题预览）</h1>
      <p class="hint">暖纸感画布 + 青色强调 + 统一组件变量</p>

      <section class="hero-panel">
        <h2>错题本（本地 Web）</h2>
        <p class="hint">手机号或邮箱登录后即可使用，所有数据仅保存在本机浏览器。</p>
        <div class="hero-meta">
          <span class="stat-pill">本地使用</span>
          <span class="stat-pill">支持语音转写</span>
          <span class="stat-pill">支持图片 OCR</span>
        </div>
      </section>

      <nav class="workspace-tabs">
        <button class="workspace-tab active" type="button">记录</button>
        <button class="workspace-tab" type="button">复习</button>
        <button class="workspace-tab" type="button">导出</button>
        <button class="workspace-tab" type="button">薄弱点</button>
        <button class="workspace-tab" type="button">设置</button>
      </nav>

      <section class="panel">
        <h2>一步录入（演示）</h2>
        <form class="form-grid">
          <div class="two-col-grid">
            <label>
              学科
              <select>
                <option>语文</option>
                <option>数学</option>
                <option>英语</option>
              </select>
            </label>
            <label>
              类别
              <input type="text" value="错别字" />
            </label>
          </div>
          <label>
            错题内容
            <textarea>把“拔河”写成“拨河”。</textarea>
          </label>
          <div class="action-row">
            <button type="button">保存错题</button>
            <button class="ghost" type="button">按 OCR 生成草稿</button>
          </div>
          <p class="success">状态：样式已加载成功。</p>
        </form>
      </section>

      <section class="panel">
        <h2>复习列表（演示）</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>学科</th>
                <th>类别</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2026-04-21</td>
                <td>语文</td>
                <td>错别字</td>
                <td>需再次复习</td>
              </tr>
              <tr>
                <td>2026-04-20</td>
                <td>数学</td>
                <td>单位错误</td>
                <td>未复习</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="error">提示：这里用于预览表格与 sticky 表头样式。</p>
      </section>
    </main>
  </body>
</html>
